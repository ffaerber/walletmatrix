name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Allow manual triggering from the Actions tab to re-run tests without
  # pushing a commit.
  workflow_dispatch:

# Cancel in-progress runs when a new commit is pushed to the same PR/branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: typecheck + test + build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test -- --reporter=verbose

      - name: Build
        run: npm run build

      - name: Verify relative asset paths (Swarm/Bee compatibility)
        # Bee gateways serve the bundle under /bzz/<ref>/... so every asset
        # URL in index.html must be relative. Catch any regression to
        # absolute paths early.
        run: |
          set -e
          if grep -E 'src="/assets/|href="/assets/' dist/index.html; then
            echo "::error::Found absolute /assets path in dist/index.html — breaks Swarm deploys"
            exit 1
          fi
          grep -q 'src="./assets/' dist/index.html
          grep -q 'href="./assets/' dist/index.html

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: walletmatrix-dist
          path: dist
          retention-days: 7
